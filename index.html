<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan Mahir Rosidul Mukhsi & Lailatun Ni'mah</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px; color: #333;
    }
    .container { 
      max-width: 600px; margin: 0 auto; background: white; 
      border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header { 
      background: #764ba2; color: white; text-align: center; 
      padding: 40px 20px;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .content { padding: 30px 25px; }
    .info { text-align: center; margin-bottom: 25px; }
    .info p { margin: 8px 0; font-size: 16px; }
    .counter { 
      background: #f8f9ff; border: 2px dashed #667eea; 
      border-radius: 15px; padding: 15px; text-align: center; 
      margin: 25px 0; font-size: 18px; font-weight: bold; color: #764ba2;
    }
    form { display: flex; flex-direction: column; gap: 15px; }
    input, textarea, select { 
      padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
      font-size: 16px; font-family: inherit;
    }
    button { 
      background: #667eea; color: white; padding: 15px; 
      border: none; border-radius: 10px; font-size: 18px; 
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #764ba2; }
    #ucapan-list { margin-top: 30px; }
    .ucapan-item { 
      background: #f8f9ff; padding: 15px; border-radius: 10px; 
      margin-bottom: 10px; border-left: 4px solid #667eea;
    }
    .ucapan-item b { color: #764ba2; }
    .ucapan-item small { color: #888; display: block; margin-top: 5px; }
    /* CSS FORM RSVP BIAR CAKEP */
#rsvp-form {
  max-width: 400px;
  margin: 0 auto;
  padding: 20px;
}

#rsvp-form input, 
#rsvp-form textarea, 
#rsvp-form select {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 16px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  font-size: 14px;
  box-sizing: border-box;
  background: #fff;
  font-family: 'Segoe UI', sans-serif;
}

#rsvp-form input:focus, 
#rsvp-form textarea:focus, 
#rsvp-form select:focus {
  outline: none;
  border-color: #c9a96e;
}

#rsvp-form button {
  width: 100%;
  padding: 16px;
  background: #c9a96e;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

#rsvp-form button:disabled {
  background: #d4d4d4;
  cursor: not-allowed;
}
#rsvp-form input, 
#rsvp-form textarea, 
#rsvp-form select {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 16px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  font-size: 14px;
  box-sizing: border-box;
  background: #fff;
  font-family: 'Segoe UI', sans-serif;
}

#rsvp-form button {
  width: 100%;
  padding: 16px;
  background: #c9a96e;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
      }
.rsvp-counter {
  text-align: center;
  margin-bottom: 30px;
}

.rsvp-counter h1 {
  font-size: 48px;
  margin: 0;
  font-weight: 300;
  color: #333;
}

.rsvp-counter p {
  color: #666;
  margin: 5px 0 0 0;
  font-size: 14px;
} 
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Undangan Pernikahan</h1>
      <p>Lailatun Ni'mah</p>
    </div>
    
    <div class="content">
      <div class="info">
        <p><b>📅 Sabtu, 08 Agustus 2026</b></p>
        <p><b>📍 Dk. Ngaglik RT 02/RW 04, Desa Tambahrejo</b></p>
        <p><b>⏰ 08.00 WIB - Selesai</b></p>
      </div>

      <div class="counter">🎉 <span id="jumlah-hadir">0</span> Orang Konfirmasi Hadir</div>

      <form id="rsvp-form">
  <input type="text" name="nama" id="nama" placeholder="Nama Anda" required>
  <textarea name="ucapan" id="ucapan" placeholder="Tulis ucapan & doa..." rows="3" required></textarea>
  <select name="kehadiran" id="kehadiran" required>
    <option value="">Konfirmasi Kehadiran</option>
    <option value="Hadir">InsyaAllah Hadir</option>
    <option value="Tidak Hadir">Maaf Tidak Bisa Hadir</option>
  </select>
  <button type="submit">Kirim Ucapan</button>
</form>

<script>
document.getElementById('rsvp-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const url = "https://script.google.com/macros/s/AKfycbyo2396_bd1YK3HbKJeZMdQBpt2Gd54Jbt0z9crU3jnUBzQcoXVBDzsuGPf1SFGbTqdZA/exec";
  const btn = this.querySelector('button');
  btn.disabled = true;
  btn.innerText = 'Mengirim...';

  fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      nama: document.getElementById('nama').value,
      ucapan: document.getElementById('ucapan').value,
      kehadiran: document.getElementById('kehadiran').value
    })
  }).then(() => {
    alert('Terima kasih! Ucapanmu sudah terkirim ❤️');
    document.getElementById('rsvp-form').reset();
    btn.disabled = false;
    btn.innerText = 'Kirim Ucapan';
  }).catch(err => {
    alert('Gagal kirim. Coba lagi ya');
    btn.disabled = false;
    btn.innerText = 'Kirim Ucapan';
  });
});
</script>

      <div id="ucapan-list">
        <h3>Ucapan & Doa:</h3>
        <div id="list-container">Memuat ucapan...</div>
      </div>
    </div>
  </div>

  <script>
    // GANTI LINK INI PAKE LINK WEB APP KAMU DARI GOOGLE APPS SCRIPT
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyM6uA1u85X_ABheUHYUHtAlx6qm61KvcrF637CJluWY7Vqg6zNifAJ0iTpapa9eQpj/exec'; 

    const form = document.getElementById('rsvp-form');
    const listContainer = document.getElementById('list-container');
    const jumlahHadir = document.getElementById('jumlah-hadir');

    // Ambil data ucapan pas halaman dibuka
    window.addEventListener('load', ambilData);

    // Kirim data pas form disubmit
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        waktu: new Date().toLocaleString('id-ID'),
        nama: document.getElementById('nama').value,
        ucapan: document.getElementById('ucapan').value,
        kehadiran: document.getElementById('kehadiran').value
      };
      
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      }).then(res => res.text())
        .then(text => {
          if(text === 'Sukses') {
            alert('Terima kasih! Ucapanmu sudah terkirim.');
            form.reset();
            ambilData(); // Refresh data
          }
        }).catch(err => alert('Gagal kirim. Coba lagi ya.'));
    });

    // Fungsi buat ambil + tampilin data
    function ambilData() {
      fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          listContainer.innerHTML = '';
          let totalHadir = 0;
          
          data.reverse().forEach(item => {
            if(item.kehadiran === 'Hadir') totalHadir++;
            listContainer.innerHTML += `
              <div class="ucapan-item">
                <b>${item.nama}</b> - ${item.kehadiran}<br>
                ${item.ucapan}
                <small>${item.waktu}</small>
              </div>
            `;
          });
          
          jumlahHadir.textContent = totalHadir;
          if(data.length === 0) listContainer.innerHTML = 'Jadilah yang pertama mengisi ucapan ✨';
        });
    }
  </script>
</body>
  </html>
